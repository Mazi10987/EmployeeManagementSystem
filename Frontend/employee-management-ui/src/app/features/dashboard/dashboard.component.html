<h1>Dashboard</h1>

<mat-grid-list cols="2" rowHeight="170">

    <mat-grid-tile>

        <mat-card>

            <mat-card-header>

                <mat-card-title>

                    Total Employees

                </mat-card-title>

            </mat-card-header>

            <mat-card-content>

                <h2>{{totalEmployees}}</h2>

            </mat-card-content>

        </mat-card>

    </mat-grid-tile>

    <mat-grid-tile>

        <mat-card>

            <mat-card-header>

                <mat-card-title>

                    Average Salary

                </mat-card-title>

            </mat-card-header>

            <mat-card-content>

                <h2>₹ {{averageSalary}}</h2>

            </mat-card-content>

        </mat-card>

    </mat-grid-tile>

    <mat-grid-tile>

        <mat-card>

            <mat-card-header>

                <mat-card-title>

                    Active Employees

                </mat-card-title>

            </mat-card-header>

            <mat-card-content>

                <h2>{{activeEmployees}}</h2>

            </mat-card-content>

        </mat-card>

    </mat-grid-tile>

    <mat-grid-tile>

        <mat-card>

            <mat-card-header>

                <mat-card-title>

                    New Employees

                </mat-card-title>

            </mat-card-header>

            <mat-card-content>

                <h2>{{newEmployees}}</h2>

            </mat-card-content>

        </mat-card>

    </mat-grid-tile>

</mat-grid-list>
